model:
  model_name: "unsloth/Llama-3.1-8B"
  max_seq_length: 2048
  load_in_4bit: True

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  dataset_name: "banking77"
  output_dir: "intent_classification_v1"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  logging_steps : 1
  num_train_epochs: 2
  warmup_ratio: 0.05
  optim: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  seed: 3407